services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tripplanner
      POSTGRES_USER: tripplanner
      POSTGRES_PASSWORD: tripplanner
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripplanner"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://tripplanner:tripplanner@postgres:5432/tripplanner?sslmode=disable
      PORT: "8080"
      STATIC_DIR: ./dist
      SEED_DATA: "true"
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      API_KEY: ${API_KEY}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
