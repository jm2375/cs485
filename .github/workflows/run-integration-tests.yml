name: Run Integration Tests

on:
  push:
    branches: ['**']        # every commit on every branch
  pull_request:
    branches: ['**']

jobs:
  integration-tests:
    name: Frontend → Backend Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # Skip when the secret is absent (e.g. forks, Dependabot PRs).
      # The test suite itself also skips every case when BASE_URL is empty,
      # so this check is just an early-exit to avoid printing confusing output.
      - name: Run integration tests
        if: ${{ secrets.BACKEND_BASE_URL != '' }}
        working-directory: frontend
        env:
          BASE_URL: ${{ secrets.BACKEND_BASE_URL }}
        run: npm run test:integration
